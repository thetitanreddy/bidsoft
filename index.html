<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Phantom Auction · Live Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="/styles.css" rel="stylesheet">
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<div id="error-log" style="display: none; color: red; background: black; padding: 20px; font-family: monospace; white-space: pre-wrap; z-index: 9999; position: absolute; top: 0; left: 0; right: 0;"></div>
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  var el = document.getElementById('error-log');
  el.style.display = 'block';
  el.innerHTML += 'ERROR: ' + msg + '\n' + url + ':' + lineNo + ':' + columnNo + '\n' + (error && error.stack ? error.stack : '') + '\n\n';
  return false;
};
window.addEventListener('unhandledrejection', function(event) {
  var el = document.getElementById('error-log');
  el.style.display = 'block';
  el.innerHTML += 'PROMISE ERROR: ' + event.reason + '\n\n';
});
</script>

<script type="module">
import { initApp } from './app.js';
// Initialize as Bidder
initApp('bidder');
</script>
</body>
</html>
